# CI : build de l'image Docker de l'API et publication sur Docker Hub.
name: it-stock-api

# Déclenché uniquement sur les branches de livraison (adapter la liste si besoin).
on:
  push:
    branches: [staging]

# Moindre privilège : le token du workflow ne peut que lire le dépôt.
permissions:
  contents: read

# Évite les courses : un nouveau push sur la même branche annule le run précédent.
concurrency:
  group: it-stock-api-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Nom du dépôt Docker Hub : <DOCKER_USERNAME>/it-stock-api
  IMAGE_NAME: it-stock-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Pas de script eslint dans ce dépôt : la compilation TypeScript sert de garde-fou avant Docker.
      - name: Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.69.3
          cache: true

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          skip-setup-trivy: "true"
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          exit-code: "0"
          format: table
          vuln-type: os,library
