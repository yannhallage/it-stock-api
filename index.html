function parseMinutes(minutes) {

const parts = String(minutes).split(":");
if (parts.length === 2) return parseInt(parts[0]) + parseInt(parts[1]) / 60;

}

const reb = (s.rebondsOff || 0) + (s.rebondsDef || 0);

function computeFormScore(recentStats, seasonAvgs) {
if (!seasonAvgs || !recentStats || recentStats.length === 0) return 50;
const recent = computeAverages(recentStats);
if (!recent) return 50;
const deltaEval = seasonAvgs.eval > 0 ? (recent.eval - seasonAvgs.eval) / seasonAvgs.eval * 100 : 0;
const deltaPts = seasonAvgs.pts > 0 ? (recent.pts - seasonAvgs.pts) / seasonAvgs.pts * 100 : 0;

return Math.round(clamp(score, 0, 100));
}

case "UPDATE_MATCH": return { ...state, matches: state.matches.map(m => m.id === action.payload.id ? action.payload : m) };
case "DELETE_MATCH": return { ...state, matches: state.matches.filter(m => m.id !== action.payload), statLines: state.statLines.filter(s => s.matchId !== action.payload) };
case "ADD_OPPONENT": return { ...state, opponents: [...state.opponents, action.payload] };

const others = mid ? state.statLines.filter(s => s.matchId !== mid) : state.statLines;
return { ...state, statLines: [...others, ...action.payload] };
}
case "ADD_TRAINING": return { ...state, trainingSessions: [...state.trainingSessions, action.payload] };
case "UPDATE_TRAINING": return { ...state, trainingSessions: state.trainingSessions.map(s => s.id === action.payload.id ? action.payload : s) };
case "DELETE_TRAINING": return { ...state, trainingSessions: state.trainingSessions.filter(s => s.id !== action.payload) };
case "UPDATE_SETTINGS": return { ...state, settings: { ...state.settings, ...action.payload } };

}

/* ─── REDUCER ─────────────────────────────────────────────── */
function reducer(state, action) {
switch (action.type) {
case “ADD_PLAYER”: return { …state, players: […state.players, action.payload] };
case “UPDATE_PLAYER”: return { …state, players: state.players.map(p => p.id === action.payload.id ? action.payload : p) };
case “DELETE_PLAYER”: return { …state, players: state.players.filter(p => p.id !== action.payload), statLines: state.statLines.filter(s => s.playerId !== action.payload) };
case “ADD_MATCH”: return { …state, matches: […state.matches, action.payload] };
case “UPDATE_MATCH”: return { …state, matches: state.matches.map(m => m.id === action.payload.id ? action.payload : m) };
case “DELETE_MATCH”: return { …state, matches: state.matches.filter(m => m.id !== action.payload), statLines: state.statLines.filter(s => s.matchId !== action.payload) };
case “ADD_OPPONENT”: return { …state, opponents: […state.opponents, action.payload] };
case “SAVE_STAT_LINES”: {
const mid = action.matchId || (action.payload[0] && action.payload[0].matchId);
const others = mid ? state.statLines.filter(s => s.matchId !== mid) : state.statLines;
return { …state, statLines: […others, …action.payload] };
}
case “ADD_TRAINING”: return { …state, trainingSessions: […state.trainingSessions, action.payload] };
case “UPDATE_TRAINING”: return { …state, trainingSessions: state.trainingSessions.map(s => s.id === action.payload.id ? action.payload : s) };
case “DELETE_TRAINING”: return { …state, trainingSessions: state.trainingSessions.filter(s => s.id !== action.payload) };
case “UPDATE_SETTINGS”: return { …state, settings: { …state.settings, …action.payload } };
case “UPDATE_COACH_NOTE”: return { …state, coachNotes: { …(state.coachNotes || {}), [action.payload.playerId]: action.payload.note } };
case “IMPORT_STATE”: return action.payload;
default: return state;
}
}
